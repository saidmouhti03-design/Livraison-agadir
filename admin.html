<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>لوحة المدير — Kaalix Agadir</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Cairo',sans-serif;background:#022c22;color:#fff;min-height:100vh;direction:rtl}
  input,button{font-family:'Cairo',sans-serif}
  button{cursor:pointer}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#166534;border-radius:4px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(22,163,74,0.2)}50%{box-shadow:0 0 40px rgba(22,163,74,0.5)}}
  .fade-in{animation:fadeIn 0.4s ease}
  .shake{animation:shake 0.5s ease}
  .pulse{animation:pulse 1.5s infinite}

  /* SCREENS */
  .screen{display:none;min-height:100vh}
  #loadingScreen{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#022c22}
  #loadingScreen.active,#loginScreen.active,#appScreen.active{display:block}
  #loadingScreen.active{display:flex}
  #loginScreen.active{display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#022c22 0%,#052e16 50%,#064e3b 100%)}

  .spinner{width:40px;height:40px;border:3px solid rgba(22,163,74,0.2);border-top-color:#16a34a;border-radius:50%;animation:spin 0.8s linear infinite}

  /* LOGIN */
  .login-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(22,163,74,0.3);border-radius:20px;padding:44px 36px;width:100%;max-width:380px;animation:glow 3s ease infinite}
  .form-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;transition:all 0.2s;outline:none}
  .form-input:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,0.2)}
  .form-group{margin-bottom:20px}
  .form-label{color:#a7f3d0;font-size:13px;display:block;margin-bottom:8px}
  .btn-green{background:#16a34a;border:none;border-radius:10px;color:#fff;font-weight:700;transition:all 0.2s}
  .btn-green:hover{background:#15803d;transform:translateY(-1px)}
  .error-box{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;margin-bottom:16px;color:#fca5a5;font-size:13px;text-align:center}

  /* HEADER */
  .app-header{background:rgba(0,0,0,0.3);backdrop-filter:blur(12px);border-bottom:1px solid rgba(22,163,74,0.2);padding:13px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}

  /* STATS BAR */
  .stats-bar{padding:14px 16px 0;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stat-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:10px 14px;min-width:100px;flex:0 0 auto}
  .stat-val{font-weight:700;font-size:18px}
  .stat-lbl{color:#6b7280;font-size:10px;margin-top:2px}

  /* TABS */
  .tabs{padding:12px 16px 8px;display:flex;gap:8px}
  .tab-btn{flex:1;padding:9px 4px;border:none;border-radius:10px;font-size:12px;font-weight:600;transition:all 0.2s}
  .tab-btn.active{background:#16a34a;color:#fff}
  .tab-btn.inactive{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#6b7280}

  /* CONTENT */
  .content{padding:0 16px 40px}

  /* DIST CARD */
  .dist-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px;margin-bottom:12px;animation:fadeIn 0.4s ease;transition:all 0.2s;cursor:pointer}
  .dist-card:hover{border-color:rgba(22,163,74,0.4);transform:translateY(-1px)}
  .dist-mini-stats{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .mini-stat{background:rgba(255,255,255,0.04);border-radius:8px;padding:5px 9px;text-align:center;flex:1;min-width:50px}
  .mini-val{font-weight:700;font-size:14px}
  .mini-lbl{color:#6b7280;font-size:9px}

  /* STATUS BADGE */
  .status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

  /* LIVE ORDER */
  .live-order{border-radius:10px;padding:13px;margin-bottom:8px}
  .progress-bar-bg{background:rgba(255,255,255,0.05);border-radius:4px;height:6px;overflow:hidden;margin:6px 0 3px}
  .progress-bar-fill{height:100%;border-radius:4px;transition:width 1s}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;backdrop-filter:blur(8px)}
  .modal-box{background:#0a2018;border:1px solid rgba(22,163,74,0.2);border-radius:20px;padding:24px;width:100%;max-width:560px;margin-top:16px;animation:fadeIn 0.3s ease}

  /* FORM */
  .add-form{background:rgba(22,163,74,0.07);border:1px solid rgba(22,163,74,0.25);border-radius:14px;padding:18px;margin-bottom:14px}
</style>
</head>
<body>

<div id="loadingScreen" class="screen active">
  <div class="spinner"></div>
  <p style="color:#6ee7b7;font-size:14px">جاري التحميل...</p>
</div>

<div id="loginScreen" class="screen">
  <div class="login-card" id="adminCard">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:48px;margin-bottom:10px">👁️</div>
      <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px">لوحة المراقبة</div>
      <div style="color:#6ee7b7;font-size:12px">دخول المدير — Kaalix Agadir</div>
    </div>
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" type="email" id="adminEmail" placeholder="admin@agadir.ma"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور (6 أرقام)</label>
      <input class="form-input" type="password" id="adminPass" maxlength="6" placeholder="••••••" style="letter-spacing:6px;font-size:18px"/>
    </div>
    <div class="error-box" id="adminError" style="display:none"></div>
    <button class="btn-green" style="width:100%;padding:14px;font-size:16px" onclick="doAdminLogin()">دخول لوحة المراقبة</button>
    <div style="margin-top:16px;text-align:center;padding:12px;background:rgba(22,163,74,0.06);border-radius:10px;border:1px solid rgba(22,163,74,0.15);color:#4ade80;font-size:11px">
      admin@agadir.ma / 000000
    </div>
  </div>
</div>

<div id="appScreen" class="screen">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">👁️</span>
      <div>
        <div style="color:#fff;font-weight:800;font-size:15px">لوحة مراقبة المدير</div>
        <div style="color:#6b7280;font-size:11px" id="adminDate">—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="lateAlert" style="display:none;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);color:#f87171;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700"></div>
      <div style="color:#16a34a;font-weight:700;font-size:15px;direction:ltr" id="adminClock">—</div>
      <button style="background:rgba(100,116,139,0.2);border:1px solid rgba(100,116,139,0.3);color:#94a3b8;border-radius:8px;padding:6px 10px;font-size:12px" onclick="doAdminLogout()">خروج</button>
    </div>
  </div>

  <div class="stats-bar" id="globalStats"></div>

  <div class="tabs">
    <button class="tab-btn active" id="tabOverview" onclick="switchTab('overview')">🗂️ نظرة عامة</button>
    <button class="tab-btn inactive" id="tabLive" onclick="switchTab('live')">🔴 مباشر</button>
    <button class="tab-btn inactive" id="tabManage" onclick="switchTab('manage')">⚙️ إدارة</button>
  </div>

  <div class="content">
    <div id="overviewSection"></div>
    <div id="liveSection" style="display:none"></div>
    <div id="manageSection" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgFA2A9RzBEZooaXRg6WEqcgg0ooo19cg",
  authDomain: "livraison-kaalix-agadir.firebaseapp.com",
  databaseURL: "https://livraison-kaalix-agadir-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "livraison-kaalix-agadir",
  storageBucket: "livraison-kaalix-agadir.firebasestorage.app",
  messagingSenderId: "185085591440",
  appId: "1:185085591440:web:1a353e8caf0e1b418c3d15",
  measurementId: "G-Q8RMZXD716"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_EMAIL = "admin@agadir.ma";
const ADMIN_PASS = "000000";
const MAX_MIN = 45;
const PROFIT = 15;
const STAGES = [
  { key:"accepted",  label:"قبول",   icon:"✅", color:"#22c55e" },
  { key:"preparing", label:"الأداء", icon:"📦", color:"#d4a017" },
  { key:"delivering",label:"توصيل", icon:"🛵", color:"#3b82f6" },
  { key:"delivered", label:"مكتملة",icon:"🏁", color:"#8b5cf6" },
];
const STATUS_CFG = {
  late:    { label:"تأخر",  color:"#ef4444", bg:"rgba(239,68,68,0.15)",    icon:"⚠️" },
  active:  { label:"نشط",   color:"#22c55e", bg:"rgba(34,197,94,0.15)",    icon:"🟢" },
  idle:    { label:"خامل",  color:"#d4a017", bg:"rgba(212,160,23,0.15)",   icon:"🟡" },
  offline: { label:"غائب",  color:"#64748b", bg:"rgba(100,116,139,0.15)",  icon:"⚫" },
};

let isAdmin = false;
let allUsers = {};
let allDeliveryData = {};
let currentTab = "overview";
let clockInt = null;
let usersListener = null;
let dataListener = null;

function todayKey() { return new Date().toISOString().split("T")[0]; }
function fmt(ms) {
  if (!ms || ms < 0) return "--";
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return `${m}د ${s}ث`;
}
function fmtClock(ts) {
  if (!ts) return "--:--";
  return new Date(ts).toLocaleTimeString("ar-MA-u-nu-latn", { hour:"2-digit", minute:"2-digit" });
}

function showScreen(id) {
  ["loadingScreen","loginScreen","appScreen"].forEach(s => {
    const el = document.getElementById(s);
    el.classList.remove("active");
    el.style.display = "none";
  });
  const t = document.getElementById(id);
  t.style.display = "";
  t.classList.add("active");
}

// ── Admin Login ──────────────────────────────────────────────────────────
window.doAdminLogin = async function() {
  const email = document.getElementById("adminEmail").value.trim();
  const pass  = document.getElementById("adminPass").value.trim();
  const errEl = document.getElementById("adminError");
  errEl.style.display = "none";

  if (email !== ADMIN_EMAIL || pass !== ADMIN_PASS) {
    errEl.textContent = "بيانات الدخول غير صحيحة";
    errEl.style.display = "block";
    document.getElementById("adminCard").classList.add("shake");
    setTimeout(() => document.getElementById("adminCard").classList.remove("shake"), 600);
    return;
  }
  isAdmin = true;
  startAdmin();
};

document.getElementById("adminPass").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doAdminLogin();
});

function startAdmin() {
  showScreen("appScreen");
  if (clockInt) clearInterval(clockInt);
  clockInt = setInterval(updateClock, 1000);
  updateClock();

  // Listen users
  usersListener = onValue(ref(db, "users"), snap => {
    allUsers = snap.exists() ? snap.val() : {};
    renderAll();
  });

  // Listen delivery data
  dataListener = onValue(ref(db, "deliveryData"), snap => {
    allDeliveryData = snap.exists() ? snap.val() : {};
    renderAll();
  });
}

function updateClock() {
  const now = new Date();
  document.getElementById("adminClock").textContent =
    now.toLocaleTimeString("ar-MA-u-nu-latn", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  document.getElementById("adminDate").textContent =
    now.toLocaleDateString("ar-MA-u-nu-latn", { weekday:"long", day:"numeric", month:"long" });
}

window.doAdminLogout = function() {
  if (clockInt) clearInterval(clockInt);
  if (usersListener) usersListener();
  if (dataListener) dataListener();
  isAdmin = false;
  showScreen("loginScreen");
};

// ── Tab Switch ───────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  ["overview","live","manage"].forEach(t => {
    document.getElementById(t+"Section").style.display = t === tab ? "block" : "none";
    document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).className =
      "tab-btn " + (t === tab ? "active" : "inactive");
  });
  renderAll();
};

// ── Build distributor list ───────────────────────────────────────────────
function getDistributors() {
  const now = Date.now();
  return Object.entries(allUsers)
    .filter(([,u]) => u.role === "distributor")
    .map(([id, u]) => {
      const userData = allDeliveryData[id] || {};
      const todayData = userData[todayKey()] || { pointage: null, orders: [] };
      const orders = todayData.orders || [];
      const completed = orders.filter(o => o.stages.delivered);
      const lateOrders = orders.filter(o => o.stages.accepted && !o.stages.delivered && (now - o.stages.accepted) > MAX_MIN * 60000);
      const activeOrders = orders.filter(o => o.stages.accepted && !o.stages.delivered);
      const status = lateOrders.length > 0 ? "late" : activeOrders.length > 0 ? "active" : todayData.pointage ? "idle" : "offline";
      return { id, ...u, todayData, orders, completed, lateOrders, activeOrders, profit: completed.length * PROFIT, isOnline: !!todayData.pointage, status };
    });
}

// ── Render All ────────────────────────────────────────────────────────────
function renderAll() {
  const now = Date.now();
  const dists = getDistributors();
  const totalOrders = dists.reduce((a,d) => a+d.orders.length, 0);
  const totalCompleted = dists.reduce((a,d) => a+d.completed.length, 0);
  const totalLate = dists.reduce((a,d) => a+d.lateOrders.length, 0);
  const totalProfit = dists.reduce((a,d) => a+d.profit, 0);
  const online = dists.filter(d => d.isOnline).length;

  // Late alert
  const la = document.getElementById("lateAlert");
  if (totalLate > 0) { la.style.display="block"; la.textContent=`⚠️ ${totalLate} متأخرة`; la.className="pulse"; }
  else la.style.display = "none";

  // Global stats
  document.getElementById("globalStats").innerHTML = [
    { icon:"👤", val:`${online}/${dists.length}`, lbl:"نشطون", color:"#22c55e" },
    { icon:"📋", val:totalOrders, lbl:"الطلبيات", color:"#3b82f6" },
    { icon:"✅", val:totalCompleted, lbl:"المكتملة", color:"#8b5cf6" },
    { icon:"⚠️", val:totalLate, lbl:"المتأخرة", color:"#ef4444" },
    { icon:"💰", val:totalProfit+" د", lbl:"الأرباح", color:"#d4a017" },
  ].map((s,i) => `<div class="stat-card" style="border:1px solid ${s.color}22;animation-delay:${i*0.06}s">
    <div style="font-size:17px">${s.icon}</div>
    <div class="stat-val" style="color:${s.color}">${s.val}</div>
    <div class="stat-lbl">${s.lbl}</div>
  </div>`).join("");

  if (currentTab === "overview") renderOverview(dists);
  else if (currentTab === "live") renderLive(dists, now);
  else renderManage(dists);
}

// ── Overview ──────────────────────────────────────────────────────────────
function renderOverview(dists) {
  if (dists.length === 0) {
    document.getElementById("overviewSection").innerHTML = `<div style="text-align:center;padding:60px 20px;color:#374151">
      <div style="font-size:44px;margin-bottom:14px">👥</div>
      <p>لا يوجد موزعون بعد.<br>أضف موزعاً من تبويب ⚙️ إدارة</p>
    </div>`;
    return;
  }
  document.getElementById("overviewSection").innerHTML = `
    <div style="padding:10px 0 6px;color:#6b7280;font-size:12px">انقر على موزع لعرض تفاصيله</div>
    ${dists.map(d => {
      const sc = STATUS_CFG[d.status];
      return `<div class="dist-card" onclick="openModal('${d.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-weight:700;font-size:15px;color:#fff">${d.name}</div>
            <div style="color:#4b5563;font-size:11px;direction:ltr">${d.email}</div>
          </div>
          <span class="status-badge ${d.status === 'late' ? 'pulse' : ''}" style="background:${sc.bg};color:${sc.color};border:1px solid ${sc.color}44">
            ${sc.icon} ${sc.label}
          </span>
        </div>
        <div class="dist-mini-stats">
          ${[
            ["حضور", d.isOnline ? fmtClock(d.todayData?.pointage) : "غائب", d.isOnline ? "#22c55e" : "#ef4444"],
            ["الطلبيات", d.orders.length, "#3b82f6"],
            ["مكتملة", d.completed.length, "#8b5cf6"],
            ["نشطة", d.activeOrders.length, "#d4a017"],
            ["متأخرة", d.lateOrders.length, "#ef4444"],
            ["الأرباح", d.profit+"د", "#16a34a"],
          ].map(([l,v,c]) => `<div class="mini-stat">
            <div class="mini-val" style="color:${c}">${v}</div>
            <div class="mini-lbl">${l}</div>
          </div>`).join("")}
        </div>
      </div>`;
    }).join("")}`;
}

// ── Live ──────────────────────────────────────────────────────────────────
function renderLive(dists, now) {
  const active = dists.filter(d => d.activeOrders.length > 0);
  if (active.length === 0) {
    document.getElementById("liveSection").innerHTML = `
      <div style="padding:8px 0 6px;color:#6b7280;font-size:12px">🔄 يتحدث تلقائياً</div>
      <div style="text-align:center;padding:60px 20px;color:#374151">
        <div style="font-size:44px;margin-bottom:14px">✅</div>
        <p>لا توجد طلبيات نشطة الآن</p>
      </div>`;
    return;
  }
  let html = `<div style="padding:8px 0 6px;color:#6b7280;font-size:12px">🔄 يتحدث تلقائياً</div>`;
  active.forEach(dist => {
    html += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-weight:700;color:#fff">${dist.name}</div>
        <div style="color:#6b7280;font-size:11px">${dist.activeOrders.length} نشطة | ${dist.lateOrders.length} متأخرة</div>
      </div>`;
    dist.activeOrders.forEach(order => {
      const elapsed = now - order.stages.accepted;
      const isLate = elapsed > MAX_MIN * 60000;
      const pct = Math.min(100, (elapsed / (MAX_MIN * 60000)) * 100);
      const stageIdx = STAGES.reduce((acc,s,i) => order.stages[s.key] ? i : acc, -1);
      const curStage = STAGES[stageIdx];
      html += `<div class="live-order" style="background:${isLate?'rgba(239,68,68,0.07)':'rgba(255,255,255,0.03)'};border:1px solid ${isLate?'rgba(239,68,68,0.25)':'rgba(255,255,255,0.06)'}">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;gap:8px;align-items:center">
            <span style="color:#d4a017;font-weight:700">#${order.id}</span>
            ${curStage ? `<span style="background:${curStage.color}22;color:${curStage.color};padding:2px 8px;border-radius:20px;font-size:10px">${curStage.icon} ${curStage.label}</span>` : ""}
          </div>
          <span style="color:${isLate?'#f87171':'#9ca3af'};font-weight:600;font-size:12px;direction:ltr">${fmt(elapsed)}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${isLate?'#ef4444':pct>75?'#d4a017':'#22c55e'}"></div>
        </div>
        <div style="color:#4b5563;font-size:10px;text-align:left;direction:ltr">${Math.round(pct)}% من ${MAX_MIN}د</div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("liveSection").innerHTML = html;
}

// ── Manage ────────────────────────────────────────────────────────────────
function renderManage(dists) {
  document.getElementById("manageSection").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">
      <h3 style="font-weight:700;color:#d1fae5;font-size:15px">قائمة الموزعين</h3>
      <button type="button" class="btn-green" style="padding:8px 14px;font-size:13px;font-weight:600;border-radius:10px" onclick="openAddForm()">➕ إضافة</button>
    </div>
    <div id="addFormContainer"></div>
    ${dists.length === 0 ? `<div style="text-align:center;padding:40px;color:#374151">لا يوجد موزعون بعد</div>` :
      dists.map(d => {
        const sc = STATUS_CFG[d.status];
        return `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:700;color:#fff">${d.name}</div>
              <div style="color:#4b5563;font-size:11px;direction:ltr">${d.email}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="status-badge" style="background:${sc.bg};color:${sc.color}">${sc.icon} ${sc.label}</span>
              <button onclick="openModal('${d.id}')" style="background:rgba(22,163,74,0.15);border:1px solid rgba(22,163,74,0.3);color:#4ade80;border-radius:8px;padding:5px 10px;font-size:11px">تفاصيل</button>
              <button onclick="deleteUser('${d.id}','${d.name}')" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:8px;padding:5px 8px;font-size:11px">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join("")}`;
}

// ── Add Form ──────────────────────────────────────────────────────────────
window.openAddForm = function() {
  document.getElementById("addFormContainer").innerHTML = `
    <div class="add-form">
      <h4 style="color:#4ade80;font-weight:700;margin-bottom:14px">موزع جديد</h4>
      ${[["الاسم الكامل","addName","text","اسم الموزع",""],
         ["البريد الإلكتروني","addEmail","email","email@agadir.ma",""],
         ["كلمة المرور (4-6 أرقام)","addPass","password","123456","maxlength='6'"]
        ].map(([l,id,t,ph,ex]) => `
        <div style="margin-bottom:12px">
          <label style="color:#a7f3d0;font-size:12px;display:block;margin-bottom:6px">${l}</label>
          <input id="${id}" type="${t}" placeholder="${ph}" ${ex} class="form-input"/>
        </div>`).join("")}
      <div style="display:flex;gap:8px;margin-top:4px">
        <button type="button" class="btn-green" style="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px" onclick="saveNewUser()">حفظ</button>
        <button type="button" onclick="document.getElementById('addFormContainer').innerHTML=''" style="flex:1;background:rgba(255,255,255,0.07);border:none;border-radius:8px;color:#9ca3af;padding:10px;font-size:14px">إلغاء</button>
      </div>
    </div>`;
};

window.saveNewUser = async function() {
  const name = document.getElementById("addName").value.trim();
  const email = document.getElementById("addEmail").value.trim();
  const pass  = document.getElementById("addPass").value.trim();
  if (!name || !email || pass.length < 4) {
    alert("يرجى ملء جميع الحقول. كلمة المرور 4 أرقام على الأقل.");
    return;
  }
  const id = "d" + Date.now();
  try {
    await set(ref(db, `users/${id}`), { name, email, password: pass, role: "distributor" });
    document.getElementById("addFormContainer").innerHTML = `
      <div style="background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);border-radius:10px;padding:14px;text-align:center;margin-bottom:12px">
        <div style="font-size:28px;margin-bottom:6px">✅</div>
        <div style="color:#4ade80;font-weight:700;font-size:14px">تم إضافة الموزع بنجاح!</div>
        <div style="color:#6b7280;font-size:12px;margin-top:4px">${name} — ${email}</div>
      </div>`;
    setTimeout(() => {
      const c = document.getElementById("addFormContainer");
      if (c) c.innerHTML = "";
    }, 3000);
  } catch(e) {
    alert("خطأ في الحفظ: " + e.message);
  }
};

// ── Delete User ───────────────────────────────────────────────────────────
window.deleteUser = async function(id, name) {
  if (!confirm(`هل أنت متأكد من حذف الموزع "${name}"؟`)) return;
  await remove(ref(db, `users/${id}`));
  await remove(ref(db, `deliveryData/${id}`));
};

// ── Modal (Distributor Detail) ────────────────────────────────────────────
window.openModal = function(distId) {
  const now = Date.now();
  const dists = getDistributors();
  const d = dists.find(x => x.id === distId);
  if (!d) return;

  const orders = d.orders;
  const completed = d.completed;

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <div style="font-weight:800;font-size:18px;color:#fff">${d.name}</div>
      <div style="color:#4b5563;font-size:12px;direction:ltr">${d.email}</div>
    </div>
    <button onclick="closeModal()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;color:#9ca3af;padding:7px 12px;font-size:17px">✕</button>
  </div>`;

  // Pointage
  html += `<div style="background:${d.todayData?.pointage?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)'};border:1px solid ${d.todayData?.pointage?'rgba(34,197,94,0.2)':'rgba(239,68,68,0.2)'};border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between">
    <span style="color:#9ca3af;font-size:13px">🕐 وقت الحضور</span>
    <span style="color:${d.todayData?.pointage?'#22c55e':'#ef4444'};font-weight:700">${d.todayData?.pointage ? fmtClock(d.todayData.pointage) : "لم يسجل الحضور"}</span>
  </div>`;

  html += `<h3 style="color:#d1fae5;font-weight:700;font-size:14px;margin:0 0 10px">الطلبيات (${orders.length})</h3>`;

  if (orders.length === 0) {
    html += `<div style="text-align:center;padding:30px;color:#4b5563">لا توجد طلبيات اليوم</div>`;
  } else {
    [...orders].reverse().forEach(order => {
      const isComplete = !!order.stages.delivered;
      const elapsed = order.stages.accepted && !isComplete ? now - order.stages.accepted : 0;
      const totalMs = isComplete && order.stages.accepted ? order.stages.delivered - order.stages.accepted : 0;
      const isLate = elapsed > MAX_MIN * 60000;
      const stageIdx = STAGES.reduce((acc,s,i) => order.stages[s.key] ? i : acc, -1);

      html += `<div style="background:${isLate?'rgba(239,68,68,0.06)':'rgba(255,255,255,0.03)'};border:1px solid ${isLate?'rgba(239,68,68,0.3)':'rgba(255,255,255,0.08)'};border-radius:12px;padding:14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span style="color:#d4a017;font-weight:700">#${order.id}</span>
          <div style="display:flex;gap:6px">
            ${isComplete ? '<span style="color:#a78bfa;font-size:11px">✅ مكتملة</span>' : ""}
            ${isLate ? '<span style="color:#f87171;font-size:11px;font-weight:700">⚠️ متأخرة</span>' : ""}
            <span style="color:#22c55e;font-weight:700;font-size:12px">+${PROFIT}د</span>
          </div>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:8px">
          ${STAGES.map((stage,idx) => {
            const done = !!order.stages[stage.key];
            return `<div style="flex:1;text-align:center">
              <div style="height:4px;background:${done?stage.color:'rgba(255,255,255,0.08)'};border-radius:2px;margin-bottom:4px"></div>
              <div style="font-size:13px">${stage.icon}</div>
              <div style="color:${done?stage.color:'#374151'};font-size:9px">${done ? fmtClock(order.stages[stage.key]) : "--"}</div>
            </div>`;
          }).join("")}
        </div>
        ${elapsed && !isComplete ? `<div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:6px;padding:5px 10px">
          <span style="color:#6b7280;font-size:11px">الوقت المنقضي:</span>
          <span style="color:${isLate?'#f87171':'#fff'};font-weight:600;font-size:11px;direction:ltr">${fmt(elapsed)} / ${MAX_MIN}د</span>
        </div>` : ""}
        ${isComplete && totalMs ? `<div style="display:flex;justify-content:space-between;background:rgba(139,92,246,0.08);border-radius:6px;padding:5px 10px">
          <span style="color:#a78bfa;font-size:11px">وقت الإنجاز:</span>
          <span style="color:#c4b5fd;font-weight:600;font-size:11px;direction:ltr">${fmt(totalMs)}</span>
        </div>` : ""}
      </div>`;
    });
  }

  // Summary
  html += `<div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
    ${[["الطلبيات",orders.length,"#3b82f6"],["المكتملة",completed.length,"#22c55e"],
       ["قيد التنفيذ",orders.length-completed.length,"#d4a017"],
       ["الأرباح",completed.length*PROFIT+" درهم","#16a34a"]
      ].map(([l,v,c]) => `<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px">
        <div style="color:${c};font-weight:700;font-size:18px">${v}</div>
        <div style="color:#6b7280;font-size:10px">${l}</div>
      </div>`).join("")}
  </div>`;

  document.getElementById("modalBox").innerHTML = html;
  document.getElementById("modalOverlay").style.display = "flex";
};

window.closeModal = function(e) {
  if (!e || e.target === document.getElementById("modalOverlay")) {
    document.getElementById("modalOverlay").style.display = "none";
  }
};

// ── Re-render every 5s ────────────────────────────────────────────────────
setInterval(() => { if (isAdmin) renderAll(); }, 5000);

// ── Init ──────────────────────────────────────────────────────────────────
showScreen("loginScreen");
</script>
</body>
</html>
